<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場商品快速查詢系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px; /* 防止 iOS 自動放大 */
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        .status {
            font-size: 13px;
            color: #718096;
            text-align: right;
            margin-top: -15px;
            margin-bottom: 15px;
        }
        .result-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .result-item {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            flex-direction: column; /* 改為上下排列，手機上看比較舒適 */
            gap: 6px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .keyword-tag {
            font-size: 12px;
            background: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .product-code {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
            background: #f7fafc;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .product-name {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.4;
            padding-left: 2px;
        }
        .empty-state {
            text-align: center;
            color: #a0aec0;
            padding: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>商品代號快速查詢</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入快速碼關鍵字...規則:去除所有英文只剩數字｜552bk35=55235｜2472cm235=247235｜bj-1835=1825" autocomplete="off">
    </div>
    <div id="status" class="status">資料載入中...</div>

    <ul id="resultList" class="result-list">
        <!-- 搜尋結果會顯示在這裡 -->
    </ul>
</div>

<script>
    let searchMap = new Map(); // 用來存放 快速碼 -> 商品物件陣列 的對應

    // 載入並解析 CSV 資料
    async function loadData() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(`data.csv?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('找不到資料檔 data.csv');
            
            const text = await response.text();
            parseCSV(text);
            
            statusEl.textContent = '系統就緒，可立即查詢';
        } catch (error) {
            statusEl.textContent = '資料載入失敗，請檢查 data.csv 是否上傳';
            statusEl.style.color = '#e53e3e';
            console.error(error);
        }
    }

    // 解析 CSV 邏輯 (包含 A、B、C 三個欄位)
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        
        // 略過第一行標題。如果 Excel 第一行就是資料，請把 i = 1 改成 i = 0
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // 拆分欄位
            const columns = line.split(',');
            if (columns.length >= 2) {
                const keyword = columns[0].trim().toLowerCase();
                const productCode = columns[1].trim();
                // 讀取 C 欄（商品全名），如果沒填就預設留空
                const productName = columns[2] ? columns[2].trim() : ''; 

                if (keyword && productCode) {
                    if (!searchMap.has(keyword)) {
                        searchMap.set(keyword, []);
                    }
                    // 將商品代號與全名打包成一個物件存入陣列
                    searchMap.get(keyword).push({
                        code: productCode,
                        name: productName
                    });
                }
            }
        }
    }

    // 搜尋與渲染邏輯
    function doSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = ''; 

        if (!query) {
            return; 
        }

        let hasResults = false;

        for (let [keyword, items] of searchMap.entries()) {
            if (keyword.includes(query)) {
                hasResults = true;
                
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'result-item';
                    
                    // 畫面呈現：上方顯示快速碼與商品代號，下方顯示商品全名
                    li.innerHTML = `
                        <div class="item-header">
                            <span class="keyword-tag">${keyword.toUpperCase()}</span>
                            <span class="product-code">${item.code}</span>
                        </div>
                        <div class="product-name">${item.name || '(未提供品名)'}</div>
                    `;
                    resultList.appendChild(li);
                });
            }
        }

        if (!hasResults) {
            resultList.innerHTML = '<li class="empty-state">找不到符合的商品</li>';
        }
    }

    document.getElementById('searchInput').addEventListener('input', doSearch);
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
