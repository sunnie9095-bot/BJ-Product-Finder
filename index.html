<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場商品快速查詢系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px; /* 防止 iOS 自動放大 */
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        .status {
            font-size: 13px;
            color: #718096;
            text-align: right;
            margin-top: -15px;
            margin-bottom: 15px;
        }
        .result-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .result-item {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .keyword-tag {
            font-size: 12px;
            background: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .product-code {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
            background: #f7fafc;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }
        .product-code:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        .product-code:active {
            transform: scale(0.95);
        }
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-top: 2px;
        }
        .product-name {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.4;
            flex: 1;
        }
        /* 價格標籤樣式 */
        .product-price {
            font-size: 15px;
            font-weight: 700;
            color: #e53e3e; /* 醒目的紅色 */
            white-space: nowrap;
        }
        .empty-state {
            text-align: center;
            color: #a0aec0;
            padding: 30px 0;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>商品代號快速查詢</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入快速碼關鍵字..." autocomplete="off">
    </div>
    <div id="status" class="status">資料載入中...</div>

    <ul id="resultList" class="result-list">
        <!-- 搜尋結果會顯示在這裡 -->
    </ul>
</div>

<div id="toast" class="toast">已複製到剪貼簿</div>

<script>
    let searchMap = new Map();

    async function loadData() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(`data.csv?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('找不到資料檔 data.csv');
            
            const text = await response.text();
            parseCSV(text);
            
            statusEl.textContent = '系統就緒，可立即查詢';
        } catch (error) {
            statusEl.textContent = '資料載入失敗，請檢查 data.csv 是否上傳';
            statusEl.style.color = '#e53e3e';
            console.error(error);
        }
    }

    // 解析 CSV 邏輯 (支援 A, B, C 與 Q 欄位)
    // 替換原本的 parseCSV 函式
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        // 使用正則表達式精準拆分 CSV 欄位（能正確處理引號中的逗號）
        const columns = parseCSVLine(line);

        if (columns.length >= 2) {
            const keyword = columns[0].trim().toLowerCase(); // A 欄：快速碼
            const productCode = columns[1].trim();          // B 欄：商品代號
            const productName = columns[2] ? columns[2].trim() : ''; // C 欄：商品全名
            
            // Q 欄位在索引中確實是第 16（A=0, B=1, C=2 ... Q=16）
            let rawPrice = columns[16] ? columns[16].trim() : '';
            
            // 清理價格字串：去雙引號、去錢號、去原本的逗號
            let cleanPrice = rawPrice.replace(/["$,]/g, '').trim();
            let price = '';

            // 判斷轉成數字並重新格式化
            if (cleanPrice && !isNaN(cleanPrice)) {
                price = '$' + Number(cleanPrice).toLocaleString();
            } else if (rawPrice) {
                price = rawPrice.replace(/"/g, ''); // 若有其他字串內容，僅去掉雙引號後呈現
            }

            if (keyword && productCode) {
                if (!searchMap.has(keyword)) {
                    searchMap.set(keyword, []);
                }
                searchMap.get(keyword).push({
                    code: productCode,
                    name: productName,
                    price: price
                });
            }
        }
    }
}

// 專門處理 CSV 引號與逗號的工具函式
function parseCSVLine(text) {
    const result = [];
    let cur = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (c === '"') {
            inQuotes = !inQuotes;
        } else if (c === ',' && !inQuotes) {
            result.push(cur);
            cur = '';
        } else {
            cur += c;
        }
    }
    result.push(cur);
    return result;
}

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast(`已複製：${text}`);
        }).catch(err => {
            console.error('複製失敗', err);
        });
    }

    let toastTimeout;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 1500);
    }

    function doSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = ''; 

        if (!query) {
            return; 
        }

        let hasResults = false;

        for (let [keyword, items] of searchMap.entries()) {
            if (keyword.includes(query)) {
                hasResults = true;
                
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'result-item';
                    
                    li.innerHTML = `
                        <div class="item-header">
                            <span class="keyword-tag">${keyword.toUpperCase()}</span>
                            <span class="product-code" onclick="copyToClipboard('${item.code}')" title="點擊複製">${item.code}</span>
                        </div>
                        <div class="item-footer">
                            <div class="product-name">${item.name || '(未提供品名)'}</div>
                            ${item.price ? `<div class="product-price">${item.price}</div>` : ''}
                        </div>
                    `;
                    resultList.appendChild(li);
                });
            }
        }

        if (!hasResults) {
            resultList.innerHTML = '<li class="empty-state">找不到符合的商品</li>';
        }
    }

    document.getElementById('searchInput').addEventListener('input', doSearch);
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
